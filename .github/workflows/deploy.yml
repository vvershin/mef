name: Deploy Mini App to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          cd miniapp
          npm install

      - name: Build
        env:
          VITE_EVENTS_URL: https://vvershin.github.io/mef/events.json
          VITE_PLACES_URL: https://vvershin.github.io/mef/places.json
          VITE_OTHER_CITIES_URL: https://vvershin.github.io/mef/other-cities.json
        run: |
          cd miniapp
          npm run build

      - name: Copy data files to dist
        run: |
          cp docs/events.json miniapp/dist/
          cp docs/places.json miniapp/dist/
          cp docs/other-cities.json miniapp/dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./miniapp/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
